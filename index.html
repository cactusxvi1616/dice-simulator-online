<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人連線骰子模擬器 - 穩定修復版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .preserve-3d { transform-style: preserve-3d; }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0); }
            25% { transform: translate(-2px, -1px) rotate(-1deg); }
            50% { transform: translate(2px, 1px) rotate(1deg); }
            75% { transform: translate(-1px, 1px) rotate(-1deg); }
        }
        .shaking { animation: shake 0.4s infinite; }
        @keyframes roll {
            0% { transform: rotateX(0) rotateY(0) scale(1); }
            50% { transform: rotateX(180deg) rotateY(180deg) scale(1.2); }
            100% { transform: rotateX(360deg) rotateY(720deg) scale(1); }
        }
        .rolling { animation: roll 0.6s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <!-- 放棄遊戲按鈕 -->
    <div id="quitContainer" class="hidden fixed top-6 right-6 z-50">
        <button onclick="requestQuit()" class="flex items-center gap-2 px-4 py-2 bg-red-50 text-red-600 border border-red-100 rounded-xl font-bold hover:bg-red-100 transition-all shadow-sm">
            <i data-lucide="log-out" size="18"></i>
            放棄遊戲
        </button>
    </div>

    <!-- 1. 大廳介面 -->
    <div id="lobby" class="max-w-md mx-auto pt-20 px-6">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
            <div class="text-center mb-8">
                <div class="inline-flex p-3 bg-indigo-600 text-white rounded-2xl mb-4">
                    <i data-lucide="dices" size="32"></i>
                </div>
                <h1 class="text-3xl font-extrabold">多人骰子大廳</h1>
                <p class="text-slate-500 mt-2">輸入房間號碼與夥伴連線</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">房間號碼</label>
                    <input type="text" id="roomInput" placeholder="例如: 1234" 
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">選擇你的動物大頭貼</label>
                    <div class="grid grid-cols-5 gap-2" id="avatarSelect">
                        <button onclick="selectAvatar('🐶')" class="avatar-btn p-3 text-2xl bg-slate-50 rounded-xl border-2 border-transparent hover:bg-indigo-50 transition-all">🐶</button>
                        <button onclick="selectAvatar('🐱')" class="avatar-btn p-3 text-2xl bg-slate-50 rounded-xl border-2 border-transparent hover:bg-indigo-50 transition-all">🐱</button>
                        <button onclick="selectAvatar(' foxes')" class="avatar-btn p-3 text-2xl bg-slate-50 rounded-xl border-2 border-transparent hover:bg-indigo-50 transition-all">🦊</button>
                        <button onclick="selectAvatar('🐻')" class="avatar-btn p-3 text-2xl bg-slate-50 rounded-xl border-2 border-transparent hover:bg-indigo-50 transition-all">🐻</button>
                        <button onclick="selectAvatar('🦁')" class="avatar-btn p-3 text-2xl bg-slate-50 rounded-xl border-2 border-transparent hover:bg-indigo-50 transition-all">🦁</button>
                    </div>
                </div>

                <button id="joinBtn" onclick="joinRoom()" 
                    class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg transition-all active:scale-95">
                    進入房間
                </button>
            </div>
        </div>
    </div>

    <!-- 2. 等待介面 -->
    <div id="waitingRoom" class="hidden max-w-md mx-auto pt-20 px-6">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100 text-center">
            <div id="waitingIcon" class="animate-bounce inline-block p-4 bg-amber-100 text-amber-600 rounded-full mb-6">
                <i data-lucide="users" size="32"></i>
            </div>
            <h2 id="waitingStatus" class="text-2xl font-bold mb-2">等待玩家中...</h2>
            <p class="text-slate-500 mb-8">房間號碼: <span id="displayRoomId" class="font-bold text-indigo-600"></span></p>
            
            <div class="space-y-4 text-left" id="playerListWaiting"></div>

            <div class="mt-8 p-4 bg-slate-50 rounded-2xl">
                <p id="progressText" class="text-sm text-slate-400">滿 4 人後將自動開始遊戲</p>
                <div class="w-full bg-slate-200 h-2 rounded-full mt-3 overflow-hidden">
                    <div id="progressBar" class="bg-indigo-600 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. 遊戲介面 -->
    <div id="gameRoom" class="hidden max-w-4xl mx-auto px-4 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div id="turnIndicator" class="bg-indigo-600 text-white p-4 rounded-2xl shadow-lg flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span id="currentAvatar" class="text-2xl">🐶</span>
                        <div class="flex flex-col">
                            <span class="font-bold">現在輪到: <span id="currentPlayerName">玩家 1</span></span>
                            <span id="timerDisplay" class="text-xs font-mono bg-indigo-700 px-2 py-0.5 rounded-full w-fit">剩餘: 30s</span>
                        </div>
                    </div>
                    <div class="text-xs opacity-80">房間: <span id="gameRoomId"></span></div>
                </div>

                <div class="bg-white rounded-3xl shadow-xl p-12 border border-slate-100 flex flex-col items-center justify-center min-h-[400px]">
                    <div id="diceContainer" class="w-24 h-24 mb-12 relative preserve-3d">
                        <div id="dice" class="w-full h-full bg-white rounded-2xl shadow-inner border-2 border-slate-100 grid grid-cols-3 grid-rows-3 gap-1 p-3"></div>
                    </div>
                    <button id="rollBtn" onclick="handleRoll()" 
                        class="w-full max-w-xs py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xl rounded-2xl shadow-lg transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                        投擲骰子
                    </button>
                    <p id="rollHint" class="mt-4 text-sm text-slate-400"></p>
                </div>
            </div>
            <div class="space-y-4">
                <h3 class="font-bold text-slate-700 px-2">玩家順序</h3>
                <div id="playerListGame" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // ============================================================
        // ⚠️ 【新手教學】請在這裡貼上您的 Firebase 設定金鑰 ⚠️
        // ============================================================
        const firebaseConfig = {
      apiKey: "AIzaSyDSsHOsT_WL5AEUswI9Q6sYq0I14sIlILw",
  authDomain: "dice-14871.firebaseapp.com",
  databaseURL: "https://dice-14871-default-rtdb.firebaseio.com",
  projectId: "dice-14871",
  storageBucket: "dice-14871.firebasestorage.app",
  messagingSenderId: "174954518651",
  appId: "1:174954518651:web:a455e402c5f69ef3902ade",
  measurementId: "G-1TWCHXVD5D"
        };
        // ============================================================

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myId = Math.random().toString(36).substring(7);
        let myAvatar = '🐶';
        let currentRoomId = '';
        let roomData = null;
        let timeoutInterval = null;
        let countdownInterval = null;
        let currentCountdownTarget = null;
        let isRolling = false;
        const TURN_TIMEOUT_MS = 30000;

        lucide.createIcons();

        function selectAvatar(emoji) {
            myAvatar = emoji;
            document.querySelectorAll('.avatar-btn').forEach(btn => {
                btn.classList.remove('border-indigo-600', 'bg-indigo-50');
                if (btn.innerText.trim() === emoji.trim()) btn.classList.add('border-indigo-600', 'bg-indigo-50');
            });
        }
        selectAvatar('🐶');

        function joinRoom() {
            const roomId = document.getElementById('roomInput').value.trim();
            if (!roomId) return alert('請輸入房間號碼');
            currentRoomId = roomId;

            const roomRef = db.ref('rooms/' + roomId);
            roomRef.get().then(snapshot => {
                let data = snapshot.val() || { players: {}, status: 'waiting' };
                const players = data.players || {};
                if (Object.keys(players).length >= 4 && !players[myId]) return alert('房間已滿！');

                roomRef.child('players/' + myId).set({
                    id: myId,
                    avatar: myAvatar,
                    joinedAt: Date.now()
                });

                showWaitingRoom();
                listenToRoom();
            });
        }

   function listenToRoom() {
            const roomRef = db.ref('rooms/' + currentRoomId);
            roomRef.on('value', snapshot => {
                roomData = snapshot.val();
                if (!roomData) return;

                // 處理放棄遊戲
                if (roomData.status === 'quit') {
                    roomRef.off();
                    alert('有玩家放棄了遊戲，回到大廳。');
                    resetToLobby();
                    return;
                }

                const players = Object.values(roomData.players || {}).sort((a, b) => a.joinedAt - b.joinedAt);
                const count = players.length;

                updateWaitingUI(players, count);

                // 🌟 修復關鍵：加上 !roomData.status 的判斷
                // 滿 4 人且在等待中（或新房間沒有狀態） -> 房主發起倒數
                if (count === 4 && (!roomData.status || roomData.status === 'waiting')) {
                    if (players[0].id === myId) {
                        roomRef.update({ 
                            status: 'starting', 
                            startTime: Date.now() + 5000 
                        });
                    }
                }

                // 處理倒數畫面
                if (roomData.status === 'starting' && roomData.startTime) {
                    handleStartCountdown(roomData.startTime, players);
                }

                // 進入遊戲畫面
                if (roomData.status === 'playing') {
                    if (countdownInterval) {
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                        currentCountdownTarget = null;
                    }
                    showGameRoom();
                }
            });
        }

        function handleStartCountdown(startTime, players) {
            // 如果目標時間沒變，就不重新啟動計時器 (防止被 Firebase 更新打斷)
            if (currentCountdownTarget === startTime) return;
            currentCountdownTarget = startTime;

            if (countdownInterval) clearInterval(countdownInterval);
            
            const statusText = document.getElementById('waitingStatus');
            const progressText = document.getElementById('progressText');
            
            countdownInterval = setInterval(() => {
                const now = Date.now();
                const diff = Math.max(0, Math.ceil((startTime - now) / 1000));
                
                statusText.innerText = `遊戲即將開始... ${diff}s`;
                progressText.innerText = `準備進入遊戲中...`;
                
                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    // 只有房主負責切換到 playing 狀態
                    if (players[0].id === myId) startMatch(players);
                }
            }, 200);
        }

        function startMatch(players) {
            const shuffledIds = players.map(p => p.id).sort(() => Math.random() - 0.5);
            db.ref('rooms/' + currentRoomId).update({
                status: 'playing',
                turnOrder: shuffledIds,
                currentTurn: 0,
                lastRoll: 1,
                turnStartTime: Date.now()
            });
        }

        function requestQuit() {
            if (!currentRoomId) return;
            if (confirm('確定要放棄遊戲嗎？這會讓所有玩家都回到大廳。')) {
                db.ref('rooms/' + currentRoomId).update({ status: 'quit' });
            }
        }

        function resetToLobby() {
            if (timeoutInterval) clearInterval(timeoutInterval);
            if (countdownInterval) clearInterval(countdownInterval);
            
            document.getElementById('lobby').classList.remove('hidden');
            document.getElementById('waitingRoom').classList.add('hidden');
            document.getElementById('gameRoom').classList.add('hidden');
            document.getElementById('quitContainer').classList.add('hidden');
            
            document.getElementById('waitingStatus').innerText = "等待玩家中...";
            document.getElementById('progressText').innerText = "滿 4 人後將自動開始遊戲";
            currentRoomId = '';
            currentCountdownTarget = null;
        }

        function updateWaitingUI(players, count) {
            document.getElementById('displayRoomId').innerText = currentRoomId;
            document.getElementById('progressBar').style.width = (count / 4 * 100) + '%';
            document.getElementById('quitContainer').classList.remove('hidden');
            
            const list = document.getElementById('playerListWaiting');
            list.innerHTML = players.map((p, i) => `
                <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <span class="text-2xl">${p.avatar}</span>
                    <span class="font-bold">玩家 ${i + 1} ${p.id === myId ? '(你)' : ''}</span>
                    <span class="ml-auto text-xs text-green-500 font-bold">已連線</span>
                </div>
            `).join('');
        }

        function showWaitingRoom() {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('waitingRoom').classList.remove('hidden');
        }

        function showGameRoom() {
            document.getElementById('waitingRoom').classList.add('hidden');
            document.getElementById('gameRoom').classList.remove('hidden');
            document.getElementById('gameRoomId').innerText = currentRoomId;

            const turnOrder = roomData.turnOrder;
            const currentTurnIdx = roomData.currentTurn;
            const currentPlayerId = turnOrder[currentTurnIdx];
            const currentPlayer = roomData.players[currentPlayerId];

            document.getElementById('currentAvatar').innerText = currentPlayer.avatar;
            document.getElementById('currentPlayerName').innerText = (currentPlayerId === myId ? '你' : '玩家 ' + (currentTurnIdx + 1));
            
            updateDiceUI(roomData.lastRoll);
            startTimeoutTimer(roomData.turnStartTime);

            const list = document.getElementById('playerListGame');
            list.innerHTML = turnOrder.map((id, i) => {
                const p = roomData.players[id];
                const isCurrent = i === currentTurnIdx;
                return `
                    <div class="flex items-center gap-3 p-4 rounded-2xl border-2 transition-all ${isCurrent ? 'bg-indigo-50 border-indigo-600 shadow-md scale-105' : 'bg-white border-slate-100 opacity-60'}">
                        <span class="text-2xl">${p.avatar}</span>
                        <div class="flex-1">
                            <div class="font-bold text-sm">${i + 1} 號位 ${id === myId ? '(你)' : ''}</div>
                            <div class="text-xs text-slate-400">${isCurrent ? '正在投擲...' : '等待中'}</div>
                        </div>
                        ${isCurrent ? '<div class="w-2 h-2 bg-indigo-600 rounded-full animate-ping"></div>' : ''}
                    </div>
                `;
            }).join('');

            const rollBtn = document.getElementById('rollBtn');
            const rollHint = document.getElementById('rollHint');
            if (currentPlayerId === myId) {
                rollBtn.disabled = false;
                rollHint.innerText = "輪到你了！請投擲骰子";
                rollHint.className = "mt-4 text-sm text-indigo-600 font-bold animate-pulse";
            } else {
                rollBtn.disabled = true;
                rollHint.innerText = "請等待其他玩家投擲...";
                rollHint.className = "mt-4 text-sm text-slate-400";
            }
        }

        function handleRoll() {
            if (isRolling) return;
            isRolling = true;
            const diceEl = document.getElementById('diceContainer');
            diceEl.classList.add('shaking');
            
            setTimeout(() => {
                diceEl.classList.remove('shaking');
                diceEl.classList.add('rolling');
                setTimeout(() => {
                    diceEl.classList.remove('rolling');
                    const newValue = Math.floor(Math.random() * 6) + 1;
                    isRolling = false;
                    const nextTurn = (roomData.currentTurn + 1) % 4;
                    db.ref('rooms/' + currentRoomId).update({
                        lastRoll: newValue,
                        currentTurn: nextTurn,
                        turnStartTime: Date.now()
                    });
                }, 600);
            }, 400);
        }

        function startTimeoutTimer(startTime) {
            if (timeoutInterval) clearInterval(timeoutInterval);
            const timerDisplay = document.getElementById('timerDisplay');
            timeoutInterval = setInterval(() => {
                const now = Date.now();
                const elapsed = now - startTime;
                const remaining = Math.max(0, Math.floor((TURN_TIMEOUT_MS - elapsed) / 1000));
                timerDisplay.innerText = `剩餘: ${remaining}s`;
                if (remaining <= 0) {
                    clearInterval(timeoutInterval);
                    handleTimeout();
                }
            }, 500);
        }

        function handleTimeout() {
            const turnOrder = roomData.turnOrder;
            const nextIdx = (roomData.currentTurn + 1) % 4;
            const players = Object.values(roomData.players || {}).sort((a, b) => a.joinedAt - b.joinedAt);
            const isHost = players[0].id === myId;
            const isNextPlayer = turnOrder[nextIdx] === myId;

            if (isNextPlayer || (isHost && !roomData.players[turnOrder[nextIdx]])) {
                const nextTurn = (roomData.currentTurn + 1) % 4;
                db.ref('rooms/' + currentRoomId).update({
                    currentTurn: nextTurn,
                    turnStartTime: Date.now()
                });
            }
        }

        function updateDiceUI(value) {
            const dice = document.getElementById('dice');
            const dots = {
                1: [4], 2: [0, 8], 3: [0, 4, 8], 4: [0, 2, 6, 8], 5: [0, 2, 4, 6, 8], 6: [0, 2, 3, 5, 6, 8],
            }[value] || [];
            dice.innerHTML = Array.from({ length: 9 }).map((_, i) => `
                <div class="flex items-center justify-center">
                    ${dots.includes(i) ? '<div class="w-2.5 h-2.5 bg-slate-800 rounded-full"></div>' : ''}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
